name: 'soccer_analytics'
version: '1.0.0'
config-version: 2

profile: 'soccer_analytics'

vars:
  analysis_end_date: '2016-06-30'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

models:
  soccer_analytics:
    # Adding a global tag for the entire project
    +tags: ["soccer_pipeline"]

    staging:
      +materialized: view
      +schema: staging
      +tags: ["stg"]

    intermediate:
      +materialized: view
      +schema: intermediate
      +tags: ["int"]

    marts:
      +materialized: table
      +schema: marts
      +tags: ["mart"]