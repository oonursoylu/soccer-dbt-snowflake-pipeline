version: 2

models:
  - name: stg_soccer__player
    description: "Staging model for player profiles. Uses player_api_id as the primary business key."
    columns:
      - name: player_id
        description: "The unique business identifier for a player."
        tests:
          - unique
          - not_null
      - name: player_name
        tests:
          - not_null

  - name: stg_soccer__team
    description: "Staging model for teams. Uses team_api_id as the primary business key."
    columns:
      - name: team_id
        description: "The unique business identifier for a team."
        tests:
          - unique
          - not_null

  - name: stg_soccer__matches
    description: "Staging model for matches. Contains goals and historical betting odds."
    columns:
      - name: match_id
        tests:
          - unique
          - not_null
      - name: home_team_id
        tests:
          - not_null
      - name: away_team_id
        tests:
          - not_null

  - name: stg_soccer__player_attributes
    description: "Staging model for player ratings history."
    columns:
      - name: attribute_pk
        description: "Surrogate key for the attribute record."
        tests:
          - unique
          - not_null
      - name: player_id
        tests:
          - not_null

  - name: stg_soccer__team_attributes
    description: "Staging model for team tactical attributes."
    columns:
      - name: team_attribute_pk
        tests:
          - unique
          - not_null
      - name: team_id
        tests:
          - not_null