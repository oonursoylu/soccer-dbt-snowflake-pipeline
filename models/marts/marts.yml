version: 2

models:
  - name: mart_league_standings
    description: "Professional football league standings."
    tests:
      - dbt_utils.expression_is_true:
          arguments: # Fixed comment syntax: YAML uses #, not --
            expression: "total_points >= 0"
    columns:
      - name: league_position
        description: "Final ranking of the team based on total points."
        tests:
          - not_null
      - name: team_name
        description: "Name of the football club."
        tests:
          - not_null
      - name: total_points
        description: "Total points accumulated in the season."
        tests:
          - not_null

  - name: mart_player_performance_evolution
    description: "Tracks career progression by comparing initial vs peak rating."
    tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "growth_percentage >= 0"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "peak_rating >= initial_rating"
    columns:
      - name: player_name
        description: "Full name of the player."
        tests:
          - not_null
      - name: growth_percentage
        description: "Percentage growth from initial to peak rating."
        tests:
          - not_null
      - name: peak_rating
        description: "Highest FIFA rating achieved."
        tests:
          - not_null

  - name: mart_team_tactical_dna
    description: "Aggregates historical FIFA team attributes to identify tactical identity."
    tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "observation_count >= 5"
    columns:
      - name: tactical_archetype
        description: "Categorized tactical playstyle."
        tests:
          - not_null
          - accepted_values:
              values: ['Tiki-Taka / Possession', 'Fast Counter-Attack', 'High Pressing / Aggressive', 'Balanced']
      - name: observation_count
        description: "Number of historical records analyzed."
        tests:
          - not_null

  - name: mart_team_betting_predictability
    description: "Analyzes how predictable a team is based on betting odds."
    tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "unpredictability_index between 0 and 100"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "total_matches >= 10"
    columns:
      - name: unpredictability_index
        description: "Score representing betting volatility."
        tests:
          - not_null
      - name: total_matches
        description: "Total matches played."
        tests:
          - not_null