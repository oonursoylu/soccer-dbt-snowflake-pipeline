version: 2

models:
  - name: mart_league_standings
    description: "Professional football league standings per season and league."
    tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "total_points >= 0"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "wins + draws + losses = matches_played"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "(wins * 3) + draws = total_points"
    columns:
      - name: league_position
        tests:
          - not_null
      - name: team_name
        tests:
          - not_null
      - name: total_points
        tests:
          - not_null

  - name: mart_player_performance_evolution
    description: "Career progression: initial vs peak rating and peak duration."
    tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "growth_percentage >= 0"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "peak_rating >= initial_rating"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "peak_duration_months >= 0"
    columns:
      - name: player_name
        tests:
          - not_null
      - name: growth_percentage
        tests:
          - not_null
      - name: peak_rating
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 1
              max_value: 99
      - name: initial_rating
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 1
              max_value: 99

  - name: mart_team_tactical_dna
    description: "Tactical identity based on historical team attributes."
    tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "observation_count >= 5"
    columns:
      - name: tactical_archetype
        tests:
          - not_null
          - accepted_values:
              values:
                - 'Tiki-Taka / Possession'
                - 'Fast Counter-Attack'
                - 'High Pressing / Aggressive'
                - 'Balanced'
      - name: observation_count
        tests:
          - not_null

  - name: mart_team_betting_predictability
    description: "How predictable a team is relative to betting odds, with full upsets and draw upsets tracked separately."
    tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "unpredictability_index between 0 and 100"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "total_matches >= 10"
      # Sanity: total_unpredictable_events must equal the sum of its parts
      - dbt_utils.expression_is_true:
          arguments:
            expression: "total_unpredictable_events = favorite_fails + underdog_wins + draw_upsets"
      # Sanity: full_upsets must equal favorite_fails + underdog_wins
      - dbt_utils.expression_is_true:
          arguments:
            expression: "full_upsets = favorite_fails + underdog_wins"
    columns:
      - name: unpredictability_index
        tests:
          - not_null
      - name: total_matches
        tests:
          - not_null
      - name: favorite_fails
        tests:
          - not_null
      - name: underdog_wins
        tests:
          - not_null
      - name: draw_upsets
        tests:
          - not_null
      - name: high_risk_matches
        tests:
          - not_null