version: 2

models:
  - name: int_league_season_stats
    description: "Aggregated match metrics at the league and season level."
    columns:
      - name: league_name
        tests:
          - not_null
      - name: avg_goals_per_match
        tests:
          - not_null

  - name: int_match_betting_analysis
    description: "Match-level bookie favorite identification and prediction validation."
    columns:
      - name: match_id
        tests:
          - unique
          - not_null
      - name: bookie_favorite
        tests:
          - not_null
          - accepted_values:
              values: ['Home', 'Away', 'Draw', 'Tie']
      - name: prediction_status
        tests:
          - not_null
          - accepted_values:
              values: ['Correct', 'Wrong', 'Ambiguous']

  - name: int_player_age_analysis
    description: "Player age at the time of each FIFA rating snapshot."
    columns:
      - name: attribute_pk
        tests:
          - unique
          - not_null
      - name: age_at_rating
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 14
              max_value: 50

  - name: int_player_profiles
    description: "Player profiles with unit conversions and BMI."
    columns:
      - name: attribute_pk
        tests:
          - unique
          - not_null
      - name: bmi
        tests:
          - not_null
      - name: weight_kg
        tests:
          - not_null

  - name: int_team_match_performance
    description: "Unpivoted team match performance."
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - match_id
            - team_id
    columns:
      - name: team_id
        tests:
          - not_null
      - name: match_id
        tests:
          - not_null
      - name: venue
        tests:
          - accepted_values:
              values: ['Home', 'Away']
      - name: points_earned
        tests:
          - accepted_values:
              values: [0, 1, 3]