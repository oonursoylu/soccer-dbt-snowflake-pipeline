version: 2

snapshots:
  - name: snp_player_attributes
    description: >
      Captures historical changes in player performance metrics (SCD Type 2). 
      This tracks how ratings and technical skills evolve over a player's career.
    columns:
      - name: attribute_pk
        description: "The primary key of the snapshot record (Source ID)."
        tests:
          - unique
          - not_null
      - name: player_id
        description: "The unique identifier for the player (Business Key)."
        tests:
          - not_null
      - name: dbt_valid_from
        description: "The timestamp when this set of attributes became active."
      - name: dbt_valid_to
        description: "The timestamp when this record was superseded (NULL means currently active)."

  - name: snp_team_attributes
    description: >
      Historical record of team tactical evolutions. 
      Used to analyze how a team's playing style (pressure, speed, etc.) changes over seasons.
    columns:
      - name: team_attribute_pk
        description: "The primary key for the tactical attribute record."
        tests:
          - unique
          - not_null
      - name: team_id
        description: "The unique identifier for the team (Business Key)."
        tests:
          - not_null
      - name: rating_date
        description: "The specific date when the tactical update was recorded."