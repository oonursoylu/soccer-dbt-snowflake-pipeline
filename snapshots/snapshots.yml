version: 2

snapshots:
  - name: snp_player_attributes
    description: "SCD Type 2 history of player FIFA rating snapshots."
    columns:
      - name: dbt_scd_id
        tests:
          - unique
          - not_null
      - name: player_id
        tests:
          - not_null
      - name: dbt_valid_from
        tests:
          - not_null

  - name: snp_player_profiles
    description: "SCD Type 2 history of player physical profiles."
    columns:
      - name: dbt_scd_id
        tests:
          - unique
          - not_null
      - name: player_id
        tests:
          - not_null

  - name: snp_team_attributes
    description: "SCD Type 2 history of team tactical attributes."
    columns:
      - name: dbt_scd_id
        tests:
          - unique
          - not_null
      - name: team_id
        tests:
          - not_null